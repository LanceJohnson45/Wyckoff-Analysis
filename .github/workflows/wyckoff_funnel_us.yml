name: Wyckoff Funnel US

on:
  schedule:
    # Reuse the existing cadence first; market-specific timing can be optimized later.
    - cron: '25 10 * * 0-4'
  workflow_dispatch:

concurrency:
  group: daily-job-us-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
      FUNNEL_MARKET: "us"
      FUNNEL_POOL_MODE: "sp500"
      DAILY_JOB_SKIP_STEP4: "1"
      FUNNEL_PREWARM_DAYS: "320"
      US_SP500_SYNC_BOOTSTRAP_DAYS: "360"
      US_SP500_BATCH_SIZE: "40"
      US_SP500_SLEEP_SECONDS: "0.5"
      SP500_SNAPSHOT_CACHE_KEY: us-sp500-snapshot-${{ github.ref_name }}-${{ github.run_id }}
      TZ: Asia/Shanghai

    steps:
      - uses: actions/checkout@v4

      - name: Restore S&P500 snapshot cache
        id: restore-sp500-snapshot
        uses: actions/cache/restore@v4
        with:
          path: data/us_sp500_constituents.json
          key: ${{ env.SP500_SNAPSHOT_CACHE_KEY }}
          restore-keys: |
            us-sp500-snapshot-${{ github.ref_name }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          echo "::group::Install packages"
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          echo "::endgroup::"

      - name: Prepare logs dir
        run: mkdir -p logs

      - name: Sync S&P500 constituents
        run: |
          echo "::group::Sync S&P 500 Constituents"
          python -u scripts/us_sp500_maintenance.py sync --bootstrap-new --bootstrap-trading-days ${US_SP500_SYNC_BOOTSTRAP_DAYS} --batch-size ${US_SP500_BATCH_SIZE} --sleep-seconds ${US_SP500_SLEEP_SECONDS} \
            2>&1 | tee -a ${{ github.workspace }}/logs/us_sp500_sync.console.log
          echo "::endgroup::"

      - name: Prewarm funnel cache
        run: |
          echo "::group::Prewarm cache (US)"
          python -u scripts/funnel_prewarm.py --market us --trading-days ${FUNNEL_PREWARM_DAYS} \
            2>&1 | tee -a ${{ github.workspace }}/logs/funnel_prewarm_us.console.log
          echo "::endgroup::"

      - name: Run US daily job
        run: |
          echo "::group::Run daily job script (US)"
          python -u scripts/daily_job.py --logs ${{ github.workspace }}/logs/daily_job_us.log \
            2>&1 | tee -a ${{ github.workspace }}/logs/daily_job_us.console.log
          echo "::endgroup::"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-job-us-logs-${{ github.run_number }}
          path: logs/*.log
          retention-days: 7
          if-no-files-found: warn

      - name: Save S&P500 snapshot cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/us_sp500_constituents.json
          key: ${{ env.SP500_SNAPSHOT_CACHE_KEY }}

      - name: Notify on failure
        if: failure()
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW: ${{ github.workflow }}
          REF: ${{ github.ref_name }}
        run: |
          python -c "
          import os, urllib.request, json
          url = os.environ.get('FEISHU_WEBHOOK_URL', '')
          if not url:
            print('FEISHU_WEBHOOK_URL 未配置，跳过失败通知')
            exit(0)
          content = '**Run**: ' + os.environ.get('RUN_URL', '') + '\n**Workflow**: ' + os.environ.get('WORKFLOW', '') + '\n**Branch**: ' + os.environ.get('REF', '')
          payload = {
            'msg_type': 'interactive',
            'card': {
              'header': {'title': {'tag': 'plain_text', 'content': '❌ US 定时任务失败'}},
              'elements': [{'tag': 'div', 'text': {'tag': 'lark_md', 'content': content}}]
            }
          }
          req = urllib.request.Request(url, data=json.dumps(payload).encode(), headers={'Content-Type': 'application/json'})
          try:
            urllib.request.urlopen(req, timeout=10)
          except Exception as e:
            print('warning: 失败通知发送异常:', e)
          "
