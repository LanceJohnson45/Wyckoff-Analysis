name: Wyckoff Funnel HK

on:
  schedule:
    - cron: '25 10 * * 0-4'
  workflow_dispatch:

concurrency:
  group: daily-job-hk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
      FUNNEL_MARKET: "hk"
      FUNNEL_POOL_MODE: "hsi_hstech"
      DAILY_JOB_SKIP_STEP4: "1"
      FUNNEL_PREWARM_DAYS: "320"
      HK_SYNC_BOOTSTRAP_DAYS: "360"
      HK_POOL_BATCH_SIZE: "30"
      HK_POOL_SLEEP_SECONDS: "0.5"
      HK_SNAPSHOT_CACHE_KEY: hk-hsi-hstech-snapshot-${{ github.ref_name }}-${{ github.run_id }}
      TZ: Asia/Shanghai

    steps:
      - uses: actions/checkout@v4

      - name: Restore HK snapshot cache
        uses: actions/cache/restore@v4
        with:
          path: data/hk_hsi_hstech_constituents.json
          key: ${{ env.HK_SNAPSHOT_CACHE_KEY }}
          restore-keys: |
            hk-hsi-hstech-snapshot-${{ github.ref_name }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          echo "::group::Install packages"
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          echo "::endgroup::"

      - name: Prepare logs dir
        run: mkdir -p logs

      - name: Sync HK pool
        run: |
          echo "::group::Sync HK Index/Constituents"
          python -u scripts/hk_index_maintenance.py sync --bootstrap-new --bootstrap-trading-days ${HK_SYNC_BOOTSTRAP_DAYS} --batch-size ${HK_POOL_BATCH_SIZE} --sleep-seconds ${HK_POOL_SLEEP_SECONDS} \
            2>&1 | tee -a ${{ github.workspace }}/logs/hk_pool_sync.console.log
          echo "::endgroup::"

      - name: Prewarm funnel cache
        run: |
          echo "::group::Prewarm cache (HK)"
          python -u scripts/funnel_prewarm.py --market hk --trading-days ${FUNNEL_PREWARM_DAYS} \
            2>&1 | tee -a ${{ github.workspace }}/logs/funnel_prewarm_hk.console.log
          echo "::endgroup::"

      - name: Run HK daily job
        run: |
          echo "::group::Run daily job script (HK)"
          python -u scripts/daily_job.py --logs ${{ github.workspace }}/logs/daily_job_hk.log \
            2>&1 | tee -a ${{ github.workspace }}/logs/daily_job_hk.console.log
          echo "::endgroup::"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-job-hk-logs-${{ github.run_number }}
          path: logs/*.log
          retention-days: 7
          if-no-files-found: warn

      - name: Save HK snapshot cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/hk_hsi_hstech_constituents.json
          key: ${{ env.HK_SNAPSHOT_CACHE_KEY }}
